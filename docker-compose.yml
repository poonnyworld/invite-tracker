# MongoDB ใช้ตัวเดียวกับ honor-points-service (ประหยัดพื้นที่ ~318MB + container)
# ต้องรัน stack 1 (honor-points-service) ก่อน แล้วค่อยรัน invite-tracker

services:
  invite-tracker-bot:
    build:
      context: ./bot
      dockerfile: Dockerfile
    container_name: invite-tracker-bot
    restart: unless-stopped
    env_file:
      - ./bot/.env
    environment:
      - MONGO_URI=mongodb://honorbot-mongodb:27017/honorbot
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - invite-tracker-network
      - honor-points-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  invite-tracker-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: invite-tracker-api
    restart: unless-stopped
    ports:
      - "3013:3001"   # โฮสต์ 3013 (3011 ถูกใช้แล้ว)
    env_file:
      - ./api/.env
    environment:
      - MONGO_URI=mongodb://honorbot-mongodb:27017/honorbot
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - invite-tracker-network
      - honor-points-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  invite-tracker-network:
    driver: bridge
  honor-points-network:
    external: true
    name: honor-points-service_honor-points-network
